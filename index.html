<!doctype html>
<html class="h-full min-h-screen" lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/media/logo/mini-logo-circle-dark.svg" />
    <title>Kingspay Administrator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <meta
      name="description"
      content="Kingspay Administrator - Admin dashboard for managing payins, disbursements, merchants, operators, and reconciliation."
    />
    <meta
      name="keywords"
      content="kingspay,admin,dashboard,payin,disbursement,merchant,reconciliation"
    />
    <meta name="author" content="Kingspay" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700"
    />
    <style>
      .dark body {
        background-color: hsl(240 10% 4%);
      }
    </style>
    <script>
      (function () {
        try {
          const theme = localStorage.getItem('theme') || 'system';
          const prefersDark = window.matchMedia(
            '(prefers-color-scheme: dark)',
          ).matches;
          const isDarkMode =
            theme === 'dark' || (theme === 'system' && prefersDark);
          if (isDarkMode) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body
    class="text-foreground bg-background min-h-screen w-full text-base antialiased"
  >
    <div class="flex min-h-screen w-full" id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
